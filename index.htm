<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🌈 GPX 夢幻地圖助手 V22 - Z串完全體</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #FF85A1; --secondary: #77DDFF; --bg: #FFF5F7; --card-bg: #FFFFFF; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background-color: var(--bg); color: #555; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(255, 133, 161, 0.1); margin-bottom: 20px; border: 3px solid #FFD1DC; position: relative; }
        .card.converter { border: 3px dashed #BDECB6; }
        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.4rem; justify-content: space-between; }
        .converter h2 { color: #57A64B; }
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 2px solid #FFE4E1; border-radius: 15px; padding: 12px; box-sizing: border-box; outline: none; font-size: 13px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.85em; color: #886666; margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 12px; border-radius: 12px; border: 2px solid #F0F0F0; width: 100%; box-sizing: border-box; background: #FAFAFA; }
        button.main-btn { background: linear-gradient(135deg, var(--primary), #FF6B81); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,133,161,0.3); }
        button.conv-btn { background: linear-gradient(135deg, #74C365, #57A64B); margin-top: 10px; }
        #map { height: 300px; width: 100%; border-radius: 20px; border: 3px solid #FFD1DC; margin-top: 10px; }
        .leaflet-tooltip-own { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; font-size: 11px; padding: 1px 3px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2><span>🗺️ 路徑即時預覽</span><button style="font-size:0.6em; background:var(--secondary); color:white; border:none; padding:5px 10px; border-radius:15px; cursor:pointer;" onclick="openFullMap()">🔍 全螢幕</button></h2>
    <div id="map"></div>
</div>

<div class="card">
    <h2>🌺 皮克敏 GPX 生成器</h2>
    <textarea id="coordsInput" oninput="updatePreviewFromText()" placeholder="貼入原始座標點..."></textarea>
    <div class="controls">
        <div><label>📍 國家</label><input type="text" id="locName" value="土耳其"></div>
        <div><label>🆔 編號</label><input type="text" id="locID" value="01"></div>
        <div><label>📏 掃描半徑 (m)</label><input type="number" id="radius" value="30" oninput="updatePreviewFromText()"></div>
        <div>
            <label>🎡 運作模式</label>
            <select id="mode" onchange="updatePreviewFromText()">
                <option value="v18_z串">2. 種花 + 回訪兩次 (Z串) 🚀</option>
                <option value="flower_pass2">1. 種花 + 回訪二次 (圓串) ✨</option>
                <option value="flower_only">3. 純種花模式 (圓) 🌺</option>
                <option value="pass_only">4. 純座標路徑 (果) 🚶</option>
            </select>
        </div>
        <button class="main-btn" onclick="generateGPX()">確認並下載 GPX 🎀</button>
    </div>
</div>

<div class="card converter">
    <h2>🔄 功能五：檔案轉換/還原</h2>
    <textarea id="gpxInput" placeholder="在此貼入 <gpx>...</gpx> 代碼"></textarea>
    <button class="main-btn conv-btn" onclick="convertGPXToCoords()">提取座標並匯入生成器 🛠️</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var currentPathPoints = [], map = L.map('map').setView([23.5, 121], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
var previewLayer = L.layerGroup().addTo(map);

function getPathPoints(coords, mode, radius) {
    let pts = [];
    if (coords.length === 0) return pts;
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    pts.push([mid.lat, mid.lon]);

    coords.forEach(c => {
        const dLat = radius / 111320;
        const dLon = radius / (111320 * Math.cos(c.lat * Math.PI / 180));

        if (mode === 'v18_z串') {
            pts.push([c.lat - dLat, c.lon - dLon]); // LB
            pts.push([c.lat + dLat, c.lon - dLon]); // LT
            pts.push([c.lat, c.lon]);               // CTR
            pts.push([c.lat - dLat, c.lon + dLon]); // RB
            pts.push([c.lat + dLat, c.lon + dLon]); // RT
        } else if (mode.includes('flower')) {
            pts.push([c.lat, c.lon]);
            [0, 60, 120, 180, 240, 300].forEach(a => {
                const r = (90 - a) * Math.PI / 180;
                pts.push([c.lat + dLat * Math.sin(r), c.lon + dLon * Math.cos(r)]);
            });
            pts.push([c.lat, c.lon]);
        } else {
            pts.push([c.lat, c.lon]);
        }
    });

    if (mode === 'v18_z串' || mode === 'flower_pass2') {
        coords.forEach(c => pts.push([c.lat, c.lon])); // V2
        coords.forEach(c => pts.push([c.lat, c.lon])); // V3
    }
    pts.push([mid.lat, mid.lon]);
    return pts;
}

function updatePreviewFromText() {
    const input = document.getElementById('coordsInput').value.trim();
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    const coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);

    previewLayer.clearLayers();
    currentPathPoints = getPathPoints(coords, mode, radius);
    if (currentPathPoints.length > 0) {
        coords.forEach((c, i) => {
            L.circleMarker([c.lat, c.lon], {color: '#FF85A1', radius: 4}).addTo(previewLayer).bindTooltip(`P${(i+1).toString().padStart(2,'0')}`, {permanent:true, className:'leaflet-tooltip-own'});
        });
        L.polyline(currentPathPoints, {color: '#800000', weight: 2}).addTo(previewLayer);
        map.fitBounds(L.polyline(currentPathPoints).getBounds(), {padding: [30, 30]});
    }
}

function generateGPX() {
    const loc = document.getElementById('locName').value;
    const id = document.getElementById('locID').value;
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value);
    const coords = document.getElementById('coordsInput').value.trim().split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);

    if (coords.length === 0) return alert("請輸入座標 🌸");
    
    const path = getPathPoints(coords, mode, radius);
    let body = path.map((pt, i) => `  <wpt lat="${pt[0].toFixed(8)}" lon="${pt[1].toFixed(8)}"><name>W${i.toString().padStart(3,'0')}</name></wpt>`).join('\n');
    
    let suffix = (mode === "v18_z串") ? "_Z串" : (mode === "pass_only" ? "苗(果)" : (mode === "flower_only" ? "_Z" : "_圓串"));
    const fileName = `${loc}${id}_${coords.length}苗${suffix}.gpx`;
    
    const full = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Gemini_V22" xmlns="http://www.topografix.com/GPX/1/1">\n${body}\n</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
}

function convertGPXToCoords() {
    const input = document.getElementById('gpxInput').value;
    const parser = new DOMParser();
    const xml = parser.parseFromString(input, "text/xml");
    const points = xml.querySelectorAll('wpt, rtept, trkpt');
    let res = [], seen = new Set();
    points.forEach(p => {
        const lat = parseFloat(p.getAttribute('lat')).toFixed(6);
        const lon = parseFloat(p.getAttribute('lon')).toFixed(6);
        const key = `${lat},${lon}`;
        if (!seen.has(key)) { res.push(`${lat}, ${lon}`); seen.add(key); }
    });
    if (res.length > 2) { // 移除 START 和 END
        res.shift(); res.pop();
        document.getElementById('coordsInput').value = res.join('\n');
        updatePreviewFromText();
    }
}

function openFullMap() {
    const newWin = window.open("", "_blank");
    newWin.document.write(`<html><head><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /></head><body style="margin:0;"><div id="m" style="height:100vh;"></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script><script>var map=L.map('m');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);L.polyline(${JSON.stringify(currentPathPoints)},{color:'#800000',weight:4}).addTo(map);map.fitBounds(L.polyline(${JSON.stringify(currentPathPoints)}).getBounds());<\/script></body></html>`);
}
</script>
</body>
</html>
