<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX 路徑大師 - 苗數修正版</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 850px; margin: 20px auto; padding: 0 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #1a73e8; margin-top: 0; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-family: monospace; font-size: 12px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.85em; color: #555; margin-top: 10px; font-weight: bold; }
        select, input, button { padding: 12px; font-size: 15px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        .file-box { background: #f8f9fa; border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; }
        .footer-info { font-size: 0.8em; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌺 功能 1~3：種花與路徑產生器</h2>
    <label>貼入原始座標 (每行一組):</label>
    <textarea id="coordsInput" placeholder="60.1228700, 11.4626370"></textarea>

    <div class="controls">
        <div><label>國家地名:</label><input type="text" id="locName" value="挪威Nes"></div>
        <div><label>編號 (XX):</label><input type="text" id="locID" value="XX"></div>
        <div><label>種花半徑 (m):</label><input type="number" id="radius" value="30"></div>
        <div>
            <label>路徑模式:</label>
            <select id="mode">
                <option value="flower_pass2">種花路徑 + 單純經過兩次</option>
                <option value="flower_only">僅種花路徑</option>
                <option value="pass_only">僅單純經過座標</option>
            </select>
        </div>
        <button class="full-width" onclick="generateGPX()">產生並下載種花 GPX</button>
    </div>
</div>

<div class="card">
    <h2>🔄 功能 4：Joystick 轉 WPT 格式</h2>
    <label>上傳 Joystick GPX 檔案:</label>
    <div class="file-box" onclick="document.getElementById('fileInput').click()">
        點擊此處或拖曳檔案上傳
        <input type="file" id="fileInput" accept=".gpx" style="display:none" onchange="convertJoystickGPX(this)">
    </div>
    <div id="fileStatus" style="margin-top:10px; font-size:0.9em; color:#28a745;"></div>
</div>

<div class="footer-info">自動計算苗數 | 首尾中點緩衝 | 全球緯度校正</div>

<script>
// --- 通用下載器，確保名稱包含苗數 ---
function downloadGPX(content, name, metaName) {
    const header = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Gemini Master Tool" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${metaName}</name></metadata>\n`;
    const full = header + content + `</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
}

// --- 功能 1~3 邏輯 ---
function generateGPX() {
    const input = document.getElementById('coordsInput').value.trim();
    const locName = document.getElementById('locName').value || "Location";
    const locID = document.getElementById('locID').value || "XX";
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    
    if (!input) { alert("請貼入座標！"); return; }
    const rawCoords = input.split('\n').map(l => {
        const parts = l.split(/[\s,]+/);
        return parts.length >= 2 ? { lat: parseFloat(parts[0]), lon: parseFloat(parts[1]) } : null;
    }).filter(c => c !== null);

    const count = rawCoords.length;
    if (count === 0) return;

    // 檔名與內容名稱加入苗數
    const metaName = `${locName}${locID}/${count}苗`;
    const fileName = `${locName}${locID}_${count}苗_Generator.gpx`;

    downloadGPX(processCoordinates(rawCoords, mode, radius), fileName, metaName);
}

function processCoordinates(coords, mode, radius) {
    let pts = "";
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n`;

    if (mode.includes('flower')) {
        coords.forEach((c, i) => {
            const latOff = radius / 111000;
            const lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F0</name></wpt>\n`;
            [0, 60, 120, 180, 240, 300].forEach((a, j) => {
                const rad = (90 - a) * Math.PI / 180;
                pts += `<wpt lat="${(c.lat + latOff * Math.sin(rad)).toFixed(7)}" lon="${(c.lon + lonOff * Math.cos(rad)).toFixed(7)}"><name>P${i+1}-F${j+1}</name></wpt>\n`;
            });
            const offLon = c.lon + (5 / (111000 * Math.cos(c.lat * Math.PI / 180)));
            pts += `<wpt lat="${c.lat}" lon="${offLon.toFixed(7)}"><name>P${i+1}-F7</name></wpt>\n`;
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F8</name></wpt>\n`;
        });
    }
    
    if (mode === 'flower_pass2') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-2nd</name></wpt>\n`);
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-3rd</name></wpt>\n`);
    } else if (mode === 'pass_only') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-Pass</name></wpt>\n`);
    }

    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;
    return pts;
}

// --- 功能 4 邏輯 (Joystick 轉換) ---
function convertJoystickGPX(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
        const trkpts = xmlDoc.getElementsByTagName("trkpt");
        
        if (trkpts.length === 0) { alert("找不到 trkpt 軌跡點！"); return; }

        let wptData = "";
        let coords = [];
        for (let i = 0; i < trkpts.length; i++) {
            const lat = trkpts[i].getAttribute("lat");
            const lon = trkpts[i].getAttribute("lon");
            coords.push({ lat: parseFloat(lat), lon: parseFloat(lon) });
            wptData += `<wpt lat="${lat}" lon="${lon}"><name>T${i+1}</name></wpt>\n`;
        }

        const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
        const finalWpt = `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n` 
                         + wptData 
                         + `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;

        downloadGPX(finalWpt, `Converted_${coords.length}苗_${file.name}`, `Converted_${coords.length}苗`);
        document.getElementById('fileStatus').innerText = `成功轉換 ${coords.length} 苗！`;
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
