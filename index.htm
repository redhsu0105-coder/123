<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 GPX 繽紛種花小助手</title>
    <style>
        :root {
            --primary: #FF85A1; /* 甜美粉 */
            --secondary: #77DDFF; /* 天空藍 */
            --accent: #FFB347; /* 暖橘 */
            --bg: #FFF5F7; /* 極淺粉底 */
            --card-bg: #FFFFFF;
        }

        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            max-width: 850px; 
            margin: 40px auto; 
            padding: 0 20px; 
            background-color: var(--bg); 
            color: #555;
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(255, 133, 161, 0.15); 
            margin-bottom: 30px; 
            border: 3px solid #FFD1DC;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        h2 { 
            color: var(--primary); 
            margin-top: 0; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            font-size: 1.5rem;
        }

        textarea { 
            width: 100%; height: 160px; margin: 15px 0; 
            border: 2px solid #FFE4E1; border-radius: 15px; 
            padding: 15px; box-sizing: border-box; 
            font-family: monospace; font-size: 13px;
            outline: none; transition: 0.3s;
        }
        
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(255,133,161,0.2); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.9em; color: #886666; margin-bottom: 5px; font-weight: bold; }

        select, input { 
            padding: 12px; font-size: 15px; border-radius: 12px; 
            border: 2px solid #F0F0F0; width: 100%; box-sizing: border-box;
            background: #FAFAFA; outline: none; transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--secondary); background: white; }

        button { 
            background: linear-gradient(135deg, var(--primary), #FF6B81); 
            color: white; border: none; cursor: pointer; font-weight: bold; 
            padding: 15px; border-radius: 15px; font-size: 16px;
            box-shadow: 0 5px 15px rgba(255, 133, 161, 0.3);
            transition: 0.3s; margin-top: 10px;
        }

        button:hover { 
            filter: brightness(1.05); 
            transform: scale(1.02); 
            box-shadow: 0 8px 20px rgba(255, 133, 161, 0.4);
        }

        .file-box { 
            background: #FFF9FA; border: 3px dashed #FFD1DC; 
            padding: 40px; text-align: center; border-radius: 20px; 
            cursor: pointer; transition: 0.3s; color: #FF85A1;
            font-weight: bold;
        }

        .file-box:hover { background: #FFE8EC; border-color: var(--primary); }

        #fileStatus { margin-top: 15px; font-weight: bold; text-align: center; color: #50C878; }

        .footer-info { font-size: 0.85em; color: #BBAAAA; text-align: center; margin-top: 30px; }
        
        .badge { background: #FFD1DC; color: #FF6B81; padding: 2px 10px; border-radius: 20px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌸 功能 1~3：種花路徑產生器</h2>
    <label>🍭 請貼入原始座標 (緯度, 經度):</label>
    <textarea id="coordsInput" placeholder="60.1228700, 11.4626370"></textarea>

    <div class="controls">
        <div><label>📍 國家地名</label><input type="text" id="locName" value="挪威Nes"></div>
        <div><label>🆔 編號 (XX)</label><input type="text" id="locID" value="XX"></div>
        <div><label>📏 種花半徑 (m)</label><input type="number" id="radius" value="30"></div>
        <div>
            <label>🎡 路徑模式</label>
            <select id="mode">
                <option value="flower_pass2">種花 + 單純經過兩次 ✨</option>
                <option value="flower_only">純種花模式 🌺</option>
                <option value="pass_only">純座標路徑 🚶</option>
            </select>
        </div>
        <button class="full-width" onclick="generateGPX()">生成並下載夢幻 GPX 🎀</button>
    </div>
</div>

<div class="card">
    <h2>☁️ 功能 4：GPX 格式轉換大師</h2>
    <label>📂 上傳任何來源的檔案 (Joystick, etc.):</label>
    <div class="file-box" onclick="document.getElementById('fileInput').click()">
        ✨ 點擊此處上傳 GPX ✨<br>
        <span style="font-size: 0.8em; font-weight: normal;">(支援 trkpt, rtept, wpt)</span>
        <input type="file" id="fileInput" accept=".gpx" style="display:none" onchange="convertAnyGPX(this)">
    </div>
    <div id="fileStatus"></div>
</div>

<p class="footer-info">☁️ 具備中點緩衝技術 ‧ 全球緯度修正 ‧ 您的個人 GPX 助手 ☁️</p>

<script>
// --- 下載邏輯 ---
function downloadGPX(content, name, metaName) {
    const header = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Gemini Master Tool" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${metaName}</name></metadata>\n`;
    const full = header + content + `</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
}

// --- 功能 1~3 邏輯 ---
function generateGPX() {
    const input = document.getElementById('coordsInput').value.trim();
    const locName = document.getElementById('locName').value || "Location";
    const locID = document.getElementById('locID').value || "XX";
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    
    const rawCoords = input.split('\n').map(l => {
        const parts = l.split(/[\s,]+/);
        return parts.length >= 2 ? { lat: parseFloat(parts[0]), lon: parseFloat(parts[1]) } : null;
    }).filter(c => c !== null);

    if (rawCoords.length === 0) { alert("請記得貼入座標喔！🌸"); return; }

    const count = rawCoords.length;
    downloadGPX(processCoordinates(rawCoords, mode, radius), `${locName}${locID}_${count}苗.gpx`, `${locName}${locID}/${count}苗`);
}

function processCoordinates(coords, mode, radius) {
    let pts = "";
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n`;

    if (mode.includes('flower')) {
        coords.forEach((c, i) => {
            const latOff = radius / 111000;
            const lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F0</name></wpt>\n`;
            [0, 60, 120, 180, 240, 300].forEach((a, j) => {
                const rad = (90 - a) * Math.PI / 180;
                pts += `<wpt lat="${(c.lat + latOff * Math.sin(rad)).toFixed(7)}" lon="${(c.lon + lonOff * Math.cos(rad)).toFixed(7)}"><name>P${i+1}-F${j+1}</name></wpt>\n`;
            });
            const offLon = c.lon + (5 / (111000 * Math.cos(c.lat * Math.PI / 180)));
            pts += `<wpt lat="${c.lat}" lon="${offLon.toFixed(7)}"><name>P${i+1}-F7</name></wpt>\n`;
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F8</name></wpt>\n`;
        });
    }
    
    if (mode === 'flower_pass2') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-2nd</name></wpt>\n`);
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-3rd</name></wpt>\n`);
    } else if (mode === 'pass_only') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-Pass</name></wpt>\n`);
    }

    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;
    return pts;
}

// --- 功能 4 邏輯 ---
function convertAnyGPX(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
        
        let nodes = xmlDoc.getElementsByTagName("trkpt");
        if (nodes.length === 0) nodes = xmlDoc.getElementsByTagName("rtept");
        if (nodes.length === 0) nodes = xmlDoc.getElementsByTagName("wpt");
        
        if (nodes.length === 0) {
            const status = document.getElementById('fileStatus');
            status.style.color = "#FF6B81";
            status.innerText = "嗚嗚，找不到座標點位，檢查看看檔案格式？";
            return;
        }

        let wptData = "";
        let coords = [];
        for (let i = 0; i < nodes.length; i++) {
            const lat = nodes[i].getAttribute("lat");
            const lon = nodes[i].getAttribute("lon");
            if(lat && lon) {
                coords.push({ lat: parseFloat(lat), lon: parseFloat(lon) });
                wptData += `<wpt lat="${lat}" lon="${lon}"><name>T${i+1}</name></wpt>\n`;
            }
        }

        const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
        const finalWpt = `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n` 
                         + wptData 
                         + `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;

        downloadGPX(finalWpt, `Converted_${coords.length}苗_${file.name}`, `Converted_${coords.length}苗`);
        const status = document.getElementById('fileStatus');
        status.style.color = "#50C878";
        status.innerText = `耶！成功轉換了 ${coords.length} 個苗數 🍀`;
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
