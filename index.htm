<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 GPX 夢幻地圖助手 - V18 修正版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #FF85A1;
            --secondary: #77DDFF;
            --path-color: #800000; 
            --bg: #FFF5F7;
            --card-bg: #FFFFFF;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background-color: var(--bg); color: #555; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(255, 133, 161, 0.1); margin-bottom: 20px; border: 3px solid #FFD1DC; position: relative; }
        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.4rem; justify-content: space-between; }
        .btn-pop { font-size: 0.6em; background: var(--secondary); color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: none; font-weight: bold; }
        textarea { width: 100%; height: 150px; margin: 10px 0; border: 2px solid #FFE4E1; border-radius: 15px; padding: 12px; box-sizing: border-box; outline: none; font-size: 13px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.85em; color: #886666; margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 12px; border-radius: 12px; border: 2px solid #F0F0F0; width: 100%; box-sizing: border-box; background: #FAFAFA; outline: none; }
        button.main-btn { background: linear-gradient(135deg, var(--primary), #FF6B81); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,133,161,0.3); }
        #map { height: 350px; width: 100%; border-radius: 20px; border: 3px solid #FFD1DC; margin-top: 10px; z-index: 1; }
        .leaflet-tooltip-own { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; font-size: 11px; padding: 1px 3px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2><span>🗺️ 即時預覽 (酒紅路徑)</span><button class="btn-pop" onclick="openFullMap()">🔍 全螢幕地圖</button></h2>
    <div id="map"></div>
</div>

<div class="card">
    <h2>🌺 皮克敏 WPT 專業生成器 (含 V18)</h2>
    <label>🍭 原始座標 (緯度, 經度):</label>
    <textarea id="coordsInput" oninput="updatePreviewFromText()" placeholder="貼入座標..."></textarea>
    
    <div class="controls">
        <div><label>📍 國家/地區</label><input type="text" id="locName" value="土耳其"></div>
        <div><label>🆔 編號</label><input type="text" id="locID" value="01"></div>
        <div><label>📏 半徑 (m)</label><input type="number" id="radius" value="30" oninput="updatePreviewFromText()"></div>
        <div>
            <label>🎡 運作模式</label>
            <select id="mode" onchange="updatePreviewFromText()">
                <option value="flower_pass2">1. 種花 + 回訪二次 (圓串) ✨</option>
                <option value="flower_only">2. 純種花模式 (圓) 🌺</option>
                <option value="pass_only">3. 純座標路徑 (果) 🚶</option>
                <option value="v18_smooth">4. V18 專業順滑版 (Z串+回訪) 🚀</option>
            </select>
        </div>
        <button class="main-btn" onclick="generateGPX()">確認無誤，下載夢幻 GPX 🎀</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var currentPathPoints = [], currentCoords = [];
var map = L.map('map').setView([39.9, 32.8], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
var previewLayer = L.layerGroup().addTo(map);

function updatePreview(coords, mode, radius) {
    previewLayer.clearLayers(); currentPathPoints = []; currentCoords = coords;
    if (coords.length === 0) return;
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    
    currentPathPoints.push([mid.lat, mid.lon]);
    coords.forEach((c, i) => {
        const isV18 = (mode === 'v18_smooth');
        const label = isV18 ? `P${(i+1).toString().padStart(2,'0')}` : `P${i+1}`;
        L.circleMarker([c.lat, c.lon], {color: '#FF85A1', radius: 4}).addTo(previewLayer).bindTooltip(label, {permanent:true, className:'leaflet-tooltip-own'});
        
        currentPathPoints.push([c.lat, c.lon]);
        if (mode.includes('flower') || mode === 'v18_smooth') {
            const latOff = radius / 111000, lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            [0, 60, 120, 180, 240, 300].forEach(a => {
                const rad = (90 - a) * Math.PI / 180;
                currentPathPoints.push([c.lat + latOff * Math.sin(rad), c.lon + lonOff * Math.cos(rad)]);
            });
            currentPathPoints.push([c.lat, c.lon]); 
        }
    });
    currentPathPoints.push([mid.lat, mid.lon]);
    var poly = L.polyline(currentPathPoints, {color: '#800000', weight: 3}).addTo(previewLayer);
    map.fitBounds(poly.getBounds(), {padding: [30, 30]});
}

function updatePreviewFromText() {
    const input = document.getElementById('coordsInput').value.trim();
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    const coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);
    updatePreview(coords, mode, radius);
}

function generateGPX() {
    const loc = document.getElementById('locName').value || "土耳其";
    const id = document.getElementById('locID').value || "01";
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    const input = document.getElementById('coordsInput').value.trim();
    
    let coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);

    if (coords.length === 0) return alert("請貼入座標喔！🌸");
    
    const count = coords.length;
    let suffix = "";
    if (mode === "pass_only") suffix = `_${count}苗(果)`;
    else if (mode === "flower_pass2") suffix = `_${count}苗_圓串`;
    else if (mode === "flower_only") suffix = `_${count}苗_圓`;
    else if (mode === "v18_smooth") suffix = `_${count}苗_Z串`; // 選項 4 下載檔名改為 Z串

    const gpxContent = (mode === 'v18_smooth') ? processV18(coords, radius) : processStd(coords, radius, mode);
    downloadGPX(gpxContent, `${loc}${id}${suffix}.gpx`, `${loc}${id}`);
}

function processStd(coords, radius, mode) {
    let pts = "";
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n`;
    coords.forEach((c, i) => {
        pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}</name></wpt>\n`;
        if (mode.includes('flower')) {
            const latOff = radius / 111000, lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            [0, 60, 120, 180, 240, 300].forEach((a, j) => {
                const rad = (90 - a) * Math.PI / 180;
                pts += `<wpt lat="${(c.lat + latOff * Math.sin(rad)).toFixed(7)}" lon="${(c.lon + lonOff * Math.cos(rad)).toFixed(7)}"><name>P${i+1}-F${j+1}</name></wpt>\n`;
            });
        }
    });
    if (mode === 'flower_pass2') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-V2</name></wpt>\n`);
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-V3</name></wpt>\n`);
    }
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;
    return pts;
}

function processV18(coords, radius) {
    let pts = "";
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>00_START_MID</name></wpt>\n`;
    
    coords.forEach((c, i) => {
        const p = (i+1).toString().padStart(2, '0');
        pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${p}_CTR</name></wpt>\n`;
        const latOff = radius / 111000, lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
        [0, 60, 120, 180, 240, 300].forEach((a, j) => {
            const rad = (90 - a) * Math.PI / 180;
            pts += `<wpt lat="${(c.lat + latOff * Math.sin(rad)).toFixed(7)}" lon="${(c.lon + lonOff * Math.cos(rad)).toFixed(7)}"><name>P${p}_F${j+1}</name></wpt>\n`;
        });
        pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${p}_BACK</name></wpt>\n`;
    });
    
    // 回訪兩次
    coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>R${(i+1).toString().padStart(2, '0')}_V2</name></wpt>\n`);
    coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>R${(i+1).toString().padStart(2, '0')}_V3</name></wpt>\n`);
    
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>99_END_MID</name></wpt>\n`;
    return pts;
}

function downloadGPX(content, name, metaName) {
    const full = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Gemini_V18" xmlns="http://www.topografix.com/GPX/1/1"><metadata><name>${metaName}</name></metadata>${content}</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
}

function openFullMap() {
    const newWin = window.open("", "_blank");
    newWin.document.write(`<html><head><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /></head><body style="margin:0;"><div id="m" style="height:100vh;"></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script><script>var map=L.map('m');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);L.polyline(${JSON.stringify(currentPathPoints)},{color:'#800000',weight:4}).addTo(map);map.fitBounds(L.polyline(${JSON.stringify(currentPathPoints)}).getBounds());<\/script></body></html>`);
}
</script>
</body>
</html>
