<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 GPX 夢幻地圖助手 - 土耳其格式優化版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #FF85A1;
            --secondary: #77DDFF;
            --path-color: #800000; /* 酒紅色路徑 */
            --bg: #FFF5F7;
            --card-bg: #FFFFFF;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background-color: var(--bg); color: #555; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(255, 133, 161, 0.1); margin-bottom: 20px; border: 3px solid #FFD1DC; }
        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.4rem; }
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 2px solid #FFE4E1; border-radius: 15px; padding: 12px; box-sizing: border-box; font-family: monospace; outline: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.85em; color: #886666; margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 12px; font-size: 14px; border-radius: 12px; border: 2px solid #F0F0F0; width: 100%; box-sizing: border-box; background: #FAFAFA; outline: none; }
        button { background: linear-gradient(135deg, var(--primary), #FF6B81); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 12px; font-size: 16px; box-shadow: 0 5px 15px rgba(255, 133, 161, 0.3); transition: 0.3s; margin-top: 10px; }
        button:hover { transform: scale(1.01); filter: brightness(1.05); }
        #map { height: 400px; width: 100%; border-radius: 20px; border: 3px solid #FFD1DC; margin-top: 15px; z-index: 1; }
        .file-box { background: #FFF9FA; border: 3px dashed #FFD1DC; padding: 25px; text-align: center; border-radius: 20px; cursor: pointer; color: var(--primary); font-weight: bold; }
        #fileStatus { margin-top: 10px; font-weight: bold; text-align: center; color: #50C878; }
        .footer-info { font-size: 0.8em; color: #BBAAAA; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🗺️ 路徑即時預覽 (酒紅線)</h2>
    <div id="map"></div>
</div>

<div class="card">
    <h2>🌺 功能 1~3：種花路徑產生器</h2>
    <label>🍭 請貼入原始座標 (緯度, 經度):</label>
    <textarea id="coordsInput" oninput="updatePreviewFromText()" placeholder="例如：39.9334, 32.8597"></textarea>

    <div class="controls">
        <div><label>📍 國家地名</label><input type="text" id="locName" value="土耳其"></div>
        <div><label>🆔 編號</label><input type="text" id="locID" value="01"></div>
        <div><label>📏 種花半徑 (m)</label><input type="number" id="radius" value="30" oninput="updatePreviewFromText()"></div>
        <div>
            <label>🎡 路徑模式</label>
            <select id="mode" onchange="updatePreviewFromText()">
                <option value="flower_pass2">種花 + 回訪二次 (Z串) ✨</option>
                <option value="flower_only">純種花模式 (Z) 🌺</option>
                <option value="pass_only">純座標路徑 (果) 🚶</option>
            </select>
        </div>
        <button class="full-width" onclick="generateGPX()">確認無誤，下載夢幻 GPX 🎀</button>
    </div>
</div>

<div class="card">
    <h2>☁️ 功能 4：GPX 轉換大師</h2>
    <div class="file-box" onclick="document.getElementById('fileInput').click()">
        ✨ 點擊上傳並預覽轉換 ✨
        <input type="file" id="fileInput" accept=".gpx" style="display:none" onchange="convertAndPreview(this)">
    </div>
    <div id="fileStatus"></div>
</div>

<p class="footer-info">☁️ 具備中點緩衝 ‧ 酒紅路徑連線 ‧ 您的個人 GPX 助手 ☁️</p>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([39.93, 32.86], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
var previewLayer = L.layerGroup().addTo(map);

function updatePreview(coords, mode, radius) {
    previewLayer.clearLayers();
    if (coords.length === 0) return;
    let pathPoints = [];
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    
    pathPoints.push([mid.lat, mid.lon]);
    coords.forEach((c, i) => {
        L.circleMarker([c.lat, c.lon], {color: 'var(--primary)', radius: 5}).addTo(previewLayer);
        pathPoints.push([c.lat, c.lon]);
        if (mode.includes('flower')) {
            const latOff = radius / 111000;
            const lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            [0, 60, 120, 180, 240, 300].forEach(a => {
                const rad = (90 - a) * Math.PI / 180;
                pathPoints.push([c.lat + latOff * Math.sin(rad), c.lon + lonOff * Math.cos(rad)]);
            });
            pathPoints.push([c.lat, c.lon]);
        }
    });
    pathPoints.push([mid.lat, mid.lon]);

    var polyline = L.polyline(pathPoints, {color: '#800000', weight: 3, opacity: 0.8}).addTo(previewLayer);
    map.fitBounds(polyline.getBounds(), {padding: [20, 20]});
}

function updatePreviewFromText() {
    const input = document.getElementById('coordsInput').value.trim();
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    const coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);
    updatePreview(coords, mode, radius);
}

function convertAndPreview(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(e.target.result, "text/xml");
        let nodes = xml.getElementsByTagName("trkpt");
        if (nodes.length === 0) nodes = xml.getElementsByTagName("rtept");
        if (nodes.length === 0) nodes = xml.getElementsByTagName("wpt");
        let coords = [];
        for (let i = 0; i < nodes.length; i++) {
            coords.push({ lat: parseFloat(nodes[i].getAttribute("lat")), lon: parseFloat(nodes[i].getAttribute("lon")) });
        }
        updatePreview(coords, 'pass_only', 0);
        document.getElementById('fileStatus').innerText = `✅ 成功載入 ${coords.length} 苗！`;
        window.lastConvertedCoords = coords;
    };
    reader.readAsText(file);
}

function generateGPX() {
    const input = document.getElementById('coordsInput').value.trim();
    const locName = document.getElementById('locName').value || "Location";
    const locID = document.getElementById('locID').value || "XX";
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;

    let coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);

    if (coords.length === 0 && window.lastConvertedCoords) coords = window.lastConvertedCoords;
    if (coords.length === 0) { alert("請先輸入座標喔！"); return; }

    // --- 檔名後綴邏輯修正 ---
    let suffix = "";
    if (mode === "pass_only") suffix = "_"+coords.length+"苗(果)";
    else if (mode === "flower_pass2") suffix = "_"+coords.length+"苗_Z串";
    else if (mode === "flower_only") suffix = "_"+coords.length+"苗_Z";

    const fileName = `${locName}${locID}${suffix}.gpx`;
    const metaName = `${locName}${locID}/${coords.length}苗`;

    downloadGPX(processCoordinates(coords, mode, radius), fileName, metaName);
}

function processCoordinates(coords, mode, radius) {
    let pts = "";
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n`;
    if (mode.includes('flower')) {
        coords.forEach((c, i) => {
            const latOff = radius / 111000;
            const lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F0</name></wpt>\n`;
            [0, 60, 120, 180, 240, 300].forEach((a, j) => {
                const rad = (90 - a) * Math.PI / 180;
                pts += `<wpt lat="${(c.lat + latOff * Math.sin(rad)).toFixed(7)}" lon="${(c.lon + lonOff * Math.cos(rad)).toFixed(7)}"><name>P${i+1}-F${j+1}</name></wpt>\n`;
            });
            pts += `<wpt lat="${c.lat}" lon="${(c.lon + (5 / (111000 * Math.cos(c.lat * Math.PI / 180)))).toFixed(7)}"><name>P${i+1}-F7</name></wpt>\n`;
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F8</name></wpt>\n`;
        });
    }
    if (mode === 'flower_pass2') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-2nd</name></wpt>\n`);
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-3rd</name></wpt>\n`);
    } else if (mode === 'pass_only') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-Pass</name></wpt>\n`);
    }
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;
    return pts;
}

function downloadGPX(content, name, metaName) {
    const header = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Gemini" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${metaName}</name></metadata>\n`;
    const full = header + content + `</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
}
</script>
</body>
</html>
