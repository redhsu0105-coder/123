<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>皮克敏 WPT 工具箱 V22 - 最終正確版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #FF85A1; --secondary: #77DDFF; --bg: #FFF5F7; }
        body { font-family: sans-serif; padding: 20px; background: var(--bg); }
        .box { max-width: 850px; margin: auto; border: 3px solid #FFD1DC; padding: 25px; border-radius: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .section-title { font-weight: bold; color: #1976d2; margin: 15px 0 5px 0; }
        textarea { width: 100%; height: 140px; margin: 10px 0; border: 2px solid #FFE4E1; padding: 10px; box-sizing: border-box; border-radius: 12px; font-family: monospace; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        button { padding: 15px; cursor: pointer; font-weight: bold; border: none; border-radius: 10px; font-size: 15px; transition: 0.2s; color: white; }
        .btn-plain { background: #607d8b; }
        .btn-z { background: #4caf50; }
        .btn-mix { background: #ff9800; grid-column: span 2; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #map { height: 300px; width: 100%; border-radius: 15px; border: 2px solid #FFD1DC; margin-top: 15px; }
        .file-input-label { background: var(--secondary); padding: 10px 20px; border-radius: 8px; cursor: pointer; display: inline-block; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌸 皮克敏 WPT 工具箱 V22</h2>

        <div class="section-title">🔄 功能：GPX 檔案轉換 / 還原提取</div>
        <label class="file-input-label">
            選擇檔案轉換或還原座標
            <input type="file" id="fileInput" accept=".gpx" style="display:none;">
        </label>
        <textarea id="gpxText" placeholder="也可在此貼入 GPX 代碼進行轉換..."></textarea>
        <button class="btn-plain" style="width:100%; margin-bottom:20px;" onclick="extractCoords()">提取座標到下方生成器</button>

        <hr style="border:0; border-top:2px solid #eee;">

        <div class="section-title">🛠️ 參數設定與座標生成</div>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="locCountry" placeholder="國家" value="土耳其" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
            <input type="text" id="locNum" placeholder="編號" value="01" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
            <input type="number" id="radiusInput" placeholder="半徑(m)" value="30" style="width:80px; padding:8px; border-radius:5px; border:1px solid #ddd;">
        </div>

        <textarea id="coordsInput" oninput="drawPreview()" placeholder="貼入原始座標點 (例如：24.123, 120.456)"></textarea>
        
        <div class="btn-group">
            <button class="btn-plain" onclick="process(0)">📍 1. 純路徑 (果)</button>
            <button class="btn-z" onclick="process(1)">⚡ 2. 密集 Z 掃描 (Z)</button>
            <button class="btn-mix" onclick="process(3)">🌀 3. Z 掃描 + 2次直線回訪 (Z串)</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([23.5, 121], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var pathLayer = L.layerGroup().addTo(map);

        function parseCoords(text) {
            return text.split('\n').map(l => {
                const p = l.split(/[ ,]+/);
                return { lat: parseFloat(p[0]), lon: parseFloat(p[1]) };
            }).filter(c => !isNaN(c.lat));
        }

        function drawPreview() {
            pathLayer.clearLayers();
            const coords = parseCoords(document.getElementById('coordsInput').value);
            if (coords.length === 0) return;
            const pts = coords.map(c => [c.lat, c.lon]);
            const poly = L.polyline(pts, {color: '#FF85A1'}).addTo(pathLayer);
            map.fitBounds(poly.getBounds());
        }

        function process(mode) {
            const country = document.getElementById('locCountry').value;
            const num = document.getElementById('locNum').value;
            const radius = parseFloat(document.getElementById('radiusInput').value);
            const input = document.getElementById('coordsInput').value.trim();
            const coords = parseCoords(input);
            
            if (coords.length === 0) return alert('請先輸入座標！');

            let body = "";
            let pIdx = 1;
            const addWpt = (lat, lon, name) => {
                body += `  <wpt lat="${lat.toFixed(8)}" lon="${lon.toFixed(8)}"><name>${name}</name></wpt>\n`;
            };

            const makeZ = (c, pLabel) => {
                const la = c.lat; const lo = c.lon;
                const dLat = radius / 111320;
                const dLon = radius / (111320 * Math.cos(la * Math.PI / 180));
                // 正確 Z 順序：LB -> LT -> CTR -> RB -> RT
                addWpt(la - dLat, lo - dLon, `${pLabel}_LB`);
                addWpt(la + dLat, lo - dLon, `${pLabel}_LT`);
                addWpt(la, lo, `${pLabel}_CTR`);
                addWpt(la - dLat, lo + dLon, `${pLabel}_RB`);
                addWpt(la + dLat, lo + dLon, `${pLabel}_RT`);
            };

            const makeLine = (pts, suffix) => {
                pts.forEach((c, i) => addWpt(c.lat, c.lon, `R${String(i+1).padStart(2,'0')}_${suffix}`));
            };

            let fileName = `${country}${num}_${coords.length}苗`;

            if (mode === 0) {
                makeLine(coords, "P");
                fileName += "(果)";
            } else if (mode === 1) {
                coords.forEach((c, i) => makeZ(c, `P${String(i+1).padStart(2,'0')}`));
                fileName += "_Z";
            } else if (mode === 3) {
                coords.forEach((c, i) => makeZ(c, `P${String(i+1).padStart(2,'0')}`));
                makeLine(coords, "V2");
                makeLine(coords, "V3");
                fileName += "_Z串";
            }

            const head = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Pikmin-V22" xmlns="http://www.topografix.com/GPX/1/1">\n';
            const foot = '</gpx>';
            const blob = new Blob([head + body + foot], { type: "application/gpx+xml" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fileName + ".gpx"; a.click();
        }

        // 功能五：還原座標
        function extractCoords() {
            const text = document.getElementById('gpxText').value;
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const points = xml.querySelectorAll('wpt, rtept, trkpt');
            let res = [], seen = new Set();
            points.forEach(p => {
                const lat = parseFloat(p.getAttribute('lat')).toFixed(6);
                const lon = parseFloat(p.getAttribute('lon')).toFixed(6);
                const name = p.querySelector('name')?.textContent || "";
                // 排除 Z 偏移點與回訪點，只拿主點
                if (!name.includes("_LB") && !name.includes("_LT") && !name.includes("_RB") && !name.includes("_RT") && !name.includes("_V")) {
                    const key = `${lat},${lon}`;
                    if (!seen.has(key)) { res.push(`${lat}, ${lon}`); seen.add(key); }
                }
            });
            document.getElementById('coordsInput').value = res.join('\n');
            drawPreview();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('gpxText').value = e.target.result; extractCoords(); };
            reader.readAsText(e.target.files[0]);
        });
    </script>
</body>
</html>
