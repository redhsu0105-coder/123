<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 GPX 夢幻地圖助手 - 標籤顯示版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #FF85A1;
            --secondary: #77DDFF;
            --path-color: #800000; /* 酒紅色路徑 */
            --bg: #FFF5F7;
            --card-bg: #FFFFFF;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background-color: var(--bg); color: #555; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(255, 133, 161, 0.1); margin-bottom: 20px; border: 3px solid #FFD1DC; position: relative; }
        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.4rem; justify-content: space-between; }
        .btn-pop { font-size: 0.6em; background: var(--secondary); color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; text-decoration: none; border: none; font-weight: bold; }
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 2px solid #FFE4E1; border-radius: 15px; padding: 12px; box-sizing: border-box; outline: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.85em; color: #886666; margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 12px; border-radius: 12px; border: 2px solid #F0F0F0; width: 100%; box-sizing: border-box; background: #FAFAFA; outline: none; }
        button.main-btn { background: linear-gradient(135deg, var(--primary), #FF6B81); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,133,161,0.3); }
        #map { height: 350px; width: 100%; border-radius: 20px; border: 3px solid #FFD1DC; margin-top: 10px; z-index: 1; }
        .file-box { background: #FFF9FA; border: 3px dashed #FFD1DC; padding: 25px; text-align: center; border-radius: 20px; cursor: pointer; color: var(--primary); font-weight: bold; }
        #fileStatus { margin-top: 10px; font-weight: bold; text-align: center; color: #50C878; }
        .footer-info { font-size: 0.8em; color: #BBAAAA; text-align: center; margin-top: 20px; }
        
        /* 地圖標籤樣式 */
        .leaflet-tooltip-own {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 11px;
            padding: 1px 3px;
            border-radius: 4px;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>
        <span>🗺️ 路徑即時預覽 (酒紅線條)</span>
        <button class="btn-pop" onclick="openFullMap()">🔍 全螢幕開啟地圖</button>
    </h2>
    <div id="map"></div>
    <p style="font-size: 0.8em; text-align: center; color: #888; margin-top: 10px;">✨ 標籤顯示已啟用 (滑鼠滑過可顯示名稱) ✨</p>
</div>

<div class="card">
    <h2>🌺 功能 1~3：種花路徑產生器</h2>
    <label>🍭 請貼入原始座標 (緯度, 經度):</label>
    <textarea id="coordsInput" oninput="updatePreviewFromText()" placeholder="例如：39.9334, 32.8597&#10;39.9300, 32.8550"></textarea>

    <div class="controls">
        <div><label>📍 國家地名</label><input type="text" id="locName" value="土耳其"></div>
        <div><label>🆔 編號</label><input type="text" id="locID" value="01"></div>
        <div><label>📏 種花半徑 (m)</label><input type="number" id="radius" value="30" oninput="updatePreviewFromText()"></div>
        <div>
            <label>🎡 路徑模式</label>
            <select id="mode" onchange="updatePreviewFromText()">
                <option value="flower_pass2">種花 + 回訪二次 (Z串) ✨</option>
                <option value="flower_only">純種花模式 (Z) 🌺</option>
                <option value="pass_only">純座標路徑 (果) 🚶</option>
            </select>
        </div>
        <button class="main-btn" onclick="generateGPX()">確認無誤，下載夢幻 GPX 🎀</button>
    </div>
</div>

<div class="card">
    <h2>☁️ 功能 4：GPX 轉換大師</h2>
    <div class="file-box" onclick="document.getElementById('fileInput').click()">
        ✨ 點擊上傳並預覽轉換 ✨
        <input type="file" id="fileInput" accept=".gpx" style="display:none" onchange="convertAndPreview(this)">
    </div>
    <div id="fileStatus"></div>
</div>

<p class="footer-info">☁️ 支援酒紅路徑預覽 ‧ 自動生成對應檔名 ‧ 全螢幕檢視功能 ‧ 點位編號標籤 ☁️</p>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 全域變數儲存目前點位和路徑，以便同步到新視窗
var currentCoords = [];
var currentPathPoints = [];
var currentMode = 'flower_pass2';

var map = L.map('map').setView([39.93, 32.86], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
var previewLayer = L.layerGroup().addTo(map);

function updatePreview(coords, mode, radius) {
    previewLayer.clearLayers();
    currentPathPoints = [];
    currentCoords = coords;
    currentMode = mode;
    
    if (coords.length === 0) return;

    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    currentPathPoints.push([mid.lat, mid.lon]);

    // 起點緩衝點 (MID) 不顯示編號，只顯示 Popup
    L.circleMarker([mid.lat, mid.lon], {color: '#FFB347', radius: 7, fillOpacity: 0.7})
        .addTo(previewLayer).bindPopup("全域起點 (MID)");

    coords.forEach((c, i) => {
        // --- 核心修改：繪製點位並加上編號標籤 ---
        const labelText = (mode === 'pass_only') ? `T${i+1}` : `P${i+1}`;
        
        // 繪製中心點
        L.circleMarker([c.lat, c.lon], {color: '#FF85A1', radius: 4, fillOpacity: 0.5})
            .addTo(previewLayer)
            .bindTooltip(labelText, {permanent: true, direction: 'right', className: 'leaflet-tooltip-own', offset: [5, 0]}); // 加上編號標籤

        currentPathPoints.push([c.lat, c.lon]);
        
        // 種花圓周路徑
        if (mode.includes('flower')) {
            const latOff = radius / 111000;
            const lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            [0, 60, 120, 180, 240, 300].forEach(a => {
                const rad = (90 - a) * Math.PI / 180;
                currentPathPoints.push([c.lat + latOff * Math.sin(rad), c.lon + lonOff * Math.cos(rad)]);
            });
            currentPathPoints.push([c.lat, c.lon]); // 回中心
        }
    });
    
    // 終點緩衝點
    currentPathPoints.push([mid.lat, mid.lon]);
    L.circleMarker([mid.lat, mid.lon], {color: '#FFB347', radius: 7, fillOpacity: 0})
        .addTo(previewLayer).bindPopup("全域終點 (MID)");

    // 畫出酒紅色連線
    var polyline = L.polyline(currentPathPoints, {color: '#800000', weight: 3, opacity: 0.8}).addTo(previewLayer);
    map.fitBounds(polyline.getBounds(), {padding: [20, 20]});
}

function openFullMap() {
    if (currentPathPoints.length === 0) { alert("目前沒有路徑可以檢視喔！🌸"); return; }
    
    // 開啟新視窗並寫入地圖內容
    const newWin = window.open("", "_blank");
    const pointsJson = JSON.stringify(currentPathPoints);
    const coordsJson = JSON.stringify(currentCoords);
    const modeStr = currentMode;
    
    newWin.document.write(`
        <html>
        <head>
            <title>全螢幕路徑檢視 - 標籤版</title>
            <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
            <style>
                #fullMap { height: 100vh; width: 100vw; margin: 0; }
                /* 同步地圖標籤樣式 */
                .leaflet-tooltip-own {
                    background: rgba(255, 255, 255, 0.7);
                    border: 1px solid #FF85A1;
                    color: #FF85A1;
                    font-weight: bold;
                    font-size: 11px;
                    padding: 1px 3px;
                    border-radius: 4px;
                }
            </style>
        </head>
        <body style="margin:0;">
            <div id="fullMap"></div>
            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
            <script>
                var fMap = L.map('fullMap');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(fMap);
                var pts = ${pointsJson};
                var coords = ${coordsJson};
                var mode = '${modeStr}';
                
                // 畫酒紅連線
                var poly = L.polyline(pts, {color: '#800000', weight: 4}).addTo(fMap);
                
                // 畫點和標籤 (全螢幕版也顯示)
                coords.forEach((c, i) => {
                    const labelText = (mode === 'pass_only') ? "T" + (i+1) : "P" + (i+1);
                    L.circleMarker([c.lat, c.lon], {color: '#FF85A1', radius: 4, fillOpacity: 0.5})
                        .addTo(fMap)
                        .bindTooltip(labelText, {permanent: true, direction: 'right', className: 'leaflet-tooltip-own', offset: [5, 0]});
                });
                
                fMap.fitBounds(poly.getBounds());
            <\/script>
        </body>
        </html>
    `);
}

// (其餘 generateGPX, convertAndPreview, processCoordinates 邏輯與之前相同，已整合)
function updatePreviewFromText() {
    const input = document.getElementById('coordsInput').value.trim();
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    const coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);
    updatePreview(coords, mode, radius);
}

function convertAndPreview(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(e.target.result, "text/xml");
        let nodes = xml.getElementsByTagName("trkpt");
        if (nodes.length === 0) nodes = xml.getElementsByTagName("rtept");
        if (nodes.length === 0) nodes = xml.getElementsByTagName("wpt");
        let coords = [];
        for (let i = 0; i < nodes.length; i++) {
            coords.push({ lat: parseFloat(nodes[i].getAttribute("lat")), lon: parseFloat(nodes[i].getAttribute("lon")) });
        }
        // Joystick轉換預設不種花
        updatePreview(coords, 'pass_only', 0);
        document.getElementById('fileStatus').innerText = `✅ 成功載入 ${coords.length} 苗！請看地圖編號 T1, T2...`;
        window.lastConvertedCoords = coords;
    };
    reader.readAsText(file);
}

function generateGPX() {
    const input = document.getElementById('coordsInput').value.trim();
    const locName = document.getElementById('locName').value || "Location";
    const locID = document.getElementById('locID').value || "XX";
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    let coords = input.split('\n').map(l => {
        const p = l.split(/[\s,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);
    if (coords.length === 0 && window.lastConvertedCoords) coords = window.lastConvertedCoords;
    if (coords.length === 0) { alert("請先貼入座標喔！🌸"); return; }
    let suffix = "";
    if (mode === "pass_only") suffix = "_"+coords.length+"苗(果)";
    else if (mode === "flower_pass2") suffix = "_"+coords.length+"苗_Z串";
    else if (mode === "flower_only") suffix = "_"+coords.length+"苗_Z";
    downloadGPX(processCoordinates(coords, mode, radius), `${locName}${locID}${suffix}.gpx`, `${locName}${locID}/${coords.length}苗`);
}

function processCoordinates(coords, mode, radius) {
    let pts = "";
    const mid = { lat: (coords[0].lat + coords[coords.length-1].lat) / 2, lon: (coords[0].lon + coords[coords.length-1].lon) / 2 };
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_START</name></wpt>\n`;
    if (mode.includes('flower')) {
        coords.forEach((c, i) => {
            const latOff = radius / 111000;
            const lonOff = radius / (111000 * Math.cos(c.lat * Math.PI / 180));
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F0</name></wpt>\n`;
            [0, 60, 120, 180, 240, 300].forEach((a, j) => {
                const rad = (90 - a) * Math.PI / 180;
                pts += `<wpt lat="${(c.lat + latOff * Math.sin(rad)).toFixed(7)}" lon="${(c.lon + lonOff * Math.cos(rad)).toFixed(7)}"><name>P${i+1}-F${j+1}</name></wpt>\n`;
            });
            pts += `<wpt lat="${c.lat}" lon="${(c.lon + (5 / (111000 * Math.cos(c.lat * Math.PI / 180)))).toFixed(7)}"><name>P${i+1}-F7</name></wpt>\n`;
            pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-F8</name></wpt>\n`;
        });
    }
    if (mode === 'flower_pass2') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-2nd</name></wpt>\n`);
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-3rd</name></wpt>\n`);
    } else if (mode === 'pass_only') {
        coords.forEach((c, i) => pts += `<wpt lat="${c.lat}" lon="${c.lon}"><name>P${i+1}-Pass</name></wpt>\n`);
    }
    pts += `<wpt lat="${mid.lat.toFixed(7)}" lon="${mid.lon.toFixed(7)}"><name>MID_END</name></wpt>\n`;
    return pts;
}

function downloadGPX(content, name, metaName) {
    const header = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Gemini" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${metaName}</name></metadata>\n`;
    const full = header + content + `</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
}

// 頁面載入時先執行一次空的預覽以初始化地圖範圍
updatePreviewFromText();
</script>
</body>
</html>
