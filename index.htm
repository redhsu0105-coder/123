<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🌈 皮克敏 GPX 助手 V27 - 回訪偏移修正版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #FF85A1; --secondary: #77DDFF; --bg: #FFF5F7; --card-bg: #FFFFFF; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; background-color: var(--bg); color: #555; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(255,133,161,0.1); margin-bottom: 20px; border: 3px solid #FFD1DC; }
        h2 { color: var(--primary); margin: 0 0 15px 0; display: flex; align-items: center; gap: 10px; font-size: 1.4rem; justify-content: space-between; }
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 2px solid #FFE4E1; border-radius: 15px; padding: 12px; box-sizing: border-box; outline: none; font-size: 13px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.85em; color: #886666; margin-bottom: 5px; font-weight: bold; }
        select, input { padding: 12px; border-radius: 12px; border: 2px solid #F0F0F0; width: 100%; box-sizing: border-box; background: #FAFAFA; }
        button.main-btn { background: linear-gradient(135deg, var(--primary), #FF6B81); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,133,161,0.3); }
        #map { height: 350px; width: 100%; border-radius: 20px; border: 3px solid #FFD1DC; margin-top: 10px; }
        .leaflet-tooltip-own { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; font-size: 11px; padding: 1px 3px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2><span>🗺️ 軌跡預覽 (回訪路徑校正)</span></h2>
    <div id="map"></div>
</div>

<div class="card">
    <h2>🌺 皮克敏 GPX 生成器 V27</h2>
    <textarea id="coordsInput" oninput="updatePreviewFromText()" placeholder="貼入座標點..."></textarea>
    <div class="controls">
        <div><label>📍 國家</label><input type="text" id="locName" value="土耳其"></div>
        <div><label>🆔 編號</label><input type="text" id="locID" value="01"></div>
        <div><label>📏 Z 字偏移寬度 (m)</label><input type="number" id="radius" value="30" oninput="updatePreviewFromText()"></div>
        <div>
            <label>🎡 運作模式</label>
            <select id="mode" onchange="updatePreviewFromText()">
                <option value="z_pass2">種花 + 回訪兩次 (Z串) 🚀</option>
                <option value="z_only">純種花模式 (Z) ⚡</option>
                <option value="pass_only">純座標路徑 (果) 🚶</option>
            </select>
        </div>
        <button class="main-btn" onclick="generateGPX()">生成精確對齊的 GPX 🎀</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var currentPathPoints = [], map = L.map('map').setView([23.5, 121], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
var previewLayer = L.layerGroup().addTo(map);

function getPathPoints(coords, mode, radius) {
    let pts = [];
    let returnPoints = []; // 用於存儲回訪點
    if (coords.length === 0) return pts;

    const mid = [(coords[0].lat + coords[coords.length-1].lat) / 2, (coords[0].lon + coords[coords.length-1].lon) / 2];
    pts.push(mid);

    coords.forEach((c) => {
        if (mode.includes('z')) {
            const dLat = radius / 111320;
            const dLon = radius / (111320 * Math.cos(c.lat * Math.PI / 180));

            // Z 字點序：左上 -> 右下 -> 右上 -> 左下
            pts.push([c.lat + dLat, c.lon - dLon]); 
            pts.push([c.lat - dLat, c.lon + dLon]); 
            pts.push([c.lat + dLat, c.lon + dLon]); 
            const lastZ = [c.lat - dLat, c.lon - dLon];
            pts.push(lastZ); // 左下 (最後一個 Z 點)
            pts.push([c.lat, c.lon]); // 回中心準備接下一點
            
            // 重要：回訪點必須與 Z 字的點一致，這裡統一存儲中心座標，
            // 或是依據您的需求，若回訪也要走 Z，則需另外設計。
            // 目前修正為：回訪時直接回中心點，確保邏輯單純。
            returnPoints.push([c.lat, c.lon]);
        } else {
            pts.push([c.lat, c.lon]);
            returnPoints.push([c.lat, c.lon]);
        }
    });

    if (mode === 'z_pass2') {
        // 回訪兩次：不再產生位移，完全重合
        pts = pts.concat(returnPoints);
        pts = pts.concat(returnPoints);
    }

    pts.push(mid);
    return pts;
}

function updatePreviewFromText() {
    const input = document.getElementById('coordsInput').value.trim();
    const mode = document.getElementById('mode').value;
    const radius = parseFloat(document.getElementById('radius').value) || 30;
    const coords = input.split('\n').map(l => {
        const p = l.split(/[ ,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);

    previewLayer.clearLayers();
    currentPathPoints = getPathPoints(coords, mode, radius);
    if (currentPathPoints.length > 0) {
        coords.forEach((c, i) => {
            L.circleMarker([c.lat, c.lon], {color: '#FF85A1', radius: 4}).addTo(previewLayer).bindTooltip(`P${(i+1)}`, {permanent:true, className:'leaflet-tooltip-own'});
        });
        L.polyline(currentPathPoints, {color: '#800000', weight: 2}).addTo(previewLayer);
        map.fitBounds(L.polyline(currentPathPoints).getBounds(), {padding: [30, 30]});
    }
}

function generateGPX() {
    const loc = document.getElementById('locName').value;
    const id = document.getElementById('locID').value;
    const mode = document.getElementById('mode').value;
    const coords = document.getElementById('coordsInput').value.trim().split('\n').map(l => {
        const p = l.split(/[ ,]+/);
        return p.length >= 2 ? { lat: parseFloat(p[0]), lon: parseFloat(p[1]) } : null;
    }).filter(c => c !== null);

    const path = getPathPoints(coords, mode, parseFloat(document.getElementById('radius').value));
    let body = path.map((pt, i) => `  <wpt lat="${pt[0].toFixed(8)}" lon="${pt[1].toFixed(8)}"><name>W${i}</name></wpt>`).join('\n');
    
    let suffix = (mode === "z_pass2") ? "_Z串" : (mode === "z_only" ? "_Z" : "苗(果)");
    const fileName = `${loc}${id}_${coords.length}苗${suffix}.gpx`;
    
    const full = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="PikminGen_V27">\n${body}\n</gpx>`;
    const blob = new Blob([full], { type: 'application/gpx+xml' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fileName; a.click();
}
</script>
</body>
</html>
